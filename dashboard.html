<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUGOJOBS Dashboard — Apple Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* APPLE DESIGN SYSTEM — Light/Dark Theme                                            */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        :root {
            /* ── LIGHT MODE ── */
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #efefef;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #e5e5e7;
            --accent-color: #D1FF00;      /* AIOX Lime */
            --accent-dark: #b8e600;
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --warning-color: #ff9500;

            /* ── DARK MODE ── */
            --bg-primary-dark: #0a0a0a;
            --bg-secondary-dark: #1c1c1e;
            --bg-tertiary-dark: #2c2c2e;
            --text-primary-dark: #ffffff;
            --text-secondary-dark: #a1a1a6;
            --text-tertiary-dark: #666666;
            --border-color-dark: #424245;

            /* Spacing */
            --spacing-2xs: 4px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;

            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 12px;

            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);

            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-normal: 250ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* ── DARK MODE ACTIVATION ── */
        [data-theme="dark"] {
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --bg-tertiary: var(--bg-tertiary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --text-tertiary: var(--text-tertiary-dark);
            --border-color: var(--border-color-dark);
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* GLOBAL STYLES                                                                      */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color var(--transition-normal), color var(--transition-normal);
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* HEADER & THEME TOGGLE                                                              */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
        }

        #theme-toggle {
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        #theme-toggle:hover {
            background-color: var(--accent-color);
            color: var(--text-primary);
            border-color: var(--accent-color);
        }

        .time-display {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* MAIN CONTENT                                                                        */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        main {
            flex: 1;
            padding: var(--spacing-xl);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── KPI GRID ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .kpi-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .kpi-card:hover {
            border-color: var(--accent-color);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-color), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .kpi-card:hover::before {
            opacity: 1;
        }

        .kpi-card h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-xs);
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: baseline;
            gap: var(--spacing-xs);
        }

        .kpi-trend {
            font-size: 14px;
            color: var(--success-color);
        }

        .kpi-trend.negative {
            color: var(--danger-color);
        }

        .kpi-subtext {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
        }

        .kpi-action {
            font-size: 12px;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .kpi-action:hover {
            color: var(--accent-dark);
        }

        /* ── SECTIONS ── */
        .section {
            margin-bottom: var(--spacing-xl);
        }

        .section h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            color: var(--text-primary);
        }

        /* ── TABLE STYLES ── */
        .products-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .products-table thead {
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .products-table th {
            padding: var(--spacing-md);
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .products-table td {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .products-table tbody tr {
            transition: background-color var(--transition-fast);
        }

        .products-table tbody tr:hover {
            background-color: var(--bg-tertiary);
        }

        .products-table tbody tr:last-child td {
            border-bottom: none;
        }

        .product-image {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background-color: var(--bg-tertiary);
        }

        .product-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .product-title-cell {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .metric-positive {
            color: var(--success-color);
            font-weight: 600;
        }

        .metric-negative {
            color: var(--danger-color);
            font-weight: 600;
        }

        /* ── CAMPAIGNS GRID ── */
        .campaigns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }

        .campaign-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
        }

        .campaign-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
        }

        .campaign-metric {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .campaign-metric:last-child {
            border-bottom: none;
        }

        .campaign-metric-label {
            color: var(--text-secondary);
        }

        .campaign-metric-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ── COST FORM ── */
        .cost-form {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            max-width: 500px;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-xs);
        }

        .form-control {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(209, 255, 0, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: var(--accent-color);
            color: var(--text-primary);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-primary:hover {
            background-color: var(--accent-dark);
            transform: scale(1.02);
        }

        .cost-history {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }

        .cost-history h4 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
        }

        .cost-history-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: var(--spacing-xs) 0;
            color: var(--text-secondary);
        }

        /* ── CHART CONTAINER ── */
        #chart-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            height: 400px;
            box-shadow: var(--shadow-sm);
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* MODAL STYLES                                                                        */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: fadeIn 150ms ease-out;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition-fast);
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        /* ── ORDER ITEM IN MODAL ── */
        .order-item {
            display: flex;
            gap: var(--spacing-lg);
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
            transition: background-color var(--transition-fast);
        }

        .order-item:hover {
            background-color: var(--bg-tertiary);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-image {
            width: 120px;
            height: 120px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background-color: var(--bg-tertiary);
            flex-shrink: 0;
        }

        .order-info {
            flex: 1;
        }

        .order-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .order-detail-label {
            color: var(--text-tertiary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .order-detail-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }

        .order-detail-value.positive {
            color: var(--success-color);
        }

        .order-detail-value.negative {
            color: var(--danger-color);
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* ANIMATIONS                                                                          */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* RESPONSIVE                                                                          */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        @media (max-width: 768px) {
            main {
                padding: var(--spacing-lg);
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: var(--spacing-md);
                text-align: center;
            }

            .modal-content {
                width: 95%;
            }

            .products-table {
                font-size: 12px;
            }

            .products-table th,
            .products-table td {
                padding: var(--spacing-sm);
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app" data-theme="light">
        <header>
            <h1>📊 HUGOJOBS Dashboard</h1>
            <div class="header-right">
                <div class="time-display" id="time-display"></div>
                <button id="theme-toggle">🌙 Escuro</button>
            </div>
        </header>

        <main>
            <!-- KPI Cards -->
            <div class="kpi-grid" id="kpi-grid"></div>

            <!-- Pedidos -->
            <section class="section">
                <h2>📋 Pedidos de Hoje</h2>
                <div style="overflow-x: auto;">
                    <table class="products-table" id="products-table">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Vendas</th>
                                <th>Faturamento</th>
                                <th>CMV</th>
                                <th>Lucro</th>
                                <th>Margem</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody">
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- ADS Breakdown -->
            <section class="section">
                <h2>💰 Gasto em ADS</h2>
                <div class="campaigns-grid" id="campaigns-grid"></div>
            </section>

            <!-- Cadastro de Custos -->
            <section class="section">
                <h2>⚙️ Cadastro de Custos (CMV)</h2>
                <div class="cost-form">
                    <div class="form-group">
                        <label class="form-label">Produto</label>
                        <select class="form-control" id="product-select">
                            <option value="">Selecione um produto...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Custo Unitário (R$)</label>
                        <input type="number" class="form-control" id="cost-input" placeholder="0.00" step="0.01" min="0">
                    </div>
                    <button class="btn-primary" onclick="saveCost()">✓ Atualizar Custo</button>
                    <div class="cost-history" id="cost-history"></div>
                </div>
            </section>

            <!-- Gráfico 7 Dias -->
            <section class="section">
                <h2>📈 Análise 7 Dias</h2>
                <div id="chart-container"></div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal" id="modal-orders">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Todos os Pedidos de Hoje</h2>
                <button class="modal-close" onclick="closeModal('orders')">✕</button>
            </div>
            <div id="orders-list"></div>
        </div>
    </div>

    <div class="modal" id="modal-ads">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Breakdown de ADS por Campanha</h2>
                <button class="modal-close" onclick="closeModal('ads')">✕</button>
            </div>
            <div id="ads-list"></div>
        </div>
    </div>

    <!-- Recharts Library -->
    <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.3/dist/Recharts.js"></script>

    <script>
        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* STATE & UTILITIES                                                                   */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        let dashboardData = null;
        let costData = {};

        // Load costs from localStorage
        function loadCosts() {
            const saved = localStorage.getItem('hugojobs_costs');
            if (saved) costData = JSON.parse(saved);
        }

        // Save costs to localStorage
        function saveCosts() {
            localStorage.setItem('hugojobs_costs', JSON.stringify(costData));
        }

        // Format BRL
        const formatBRL = (num) => new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: 'BRL',
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }).format(num);

        const formatPercent = (num) => num.toFixed(1) + '%';

        // Get theme preference
        function getTheme() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18 ? 'light' : 'dark';
        }

        // Initialize theme
        function initTheme() {
            const theme = localStorage.getItem('theme') || getTheme();
            setTheme(theme);
            updateThemeButton();
            updateTimeDisplay();
        }

        function setTheme(theme) {
            document.getElementById('app').setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const current = document.getElementById('app').getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            setTheme(next);
            updateThemeButton();
        }

        function updateThemeButton() {
            const theme = document.getElementById('app').getAttribute('data-theme');
            const btn = document.getElementById('theme-toggle');
            btn.textContent = theme === 'light' ? '🌙 Escuro' : '☀️ Claro';
        }

        function updateTimeDisplay() {
            const now = new Date();
            const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const day = now.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
            document.getElementById('time-display').textContent = `${day} · ${time}`;
        }

        // Fetch dashboard data
        async function loadDashboard() {
            try {
                const response = await fetch('/mega-brain/dashboard-data.json');
                dashboardData = await response.json();

                // Fetch visits to calculate conversion
                await fetchConversionData();

                renderDashboard();
            } catch (error) {
                console.error('Erro ao carregar dashboard:', error);
            }
        }

        // Fetch conversion data from ML API
        async function fetchConversionData() {
            try {
                // Try to get visits from ML API (requires valid token)
                const sellerId = dashboardData.meta.seller_id;
                // For now, calculate from what we have
                // TODO: Integrate with ML API for actual visit count
                dashboardData.conversao_pct = (dashboardData.kpis.vendas_hoje / 5000) * 100; // placeholder
            } catch (error) {
                console.warn('Não foi possível buscar dados de conversão:', error);
                dashboardData.conversao_pct = 0;
            }
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* RENDER KPI CARDS                                                                    */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        function renderKPIs() {
            const kpis = dashboardData.kpis;
            const html = `
                <div class="kpi-card" onclick="openModal('orders')">
                    <h3>Faturamento</h3>
                    <div class="kpi-value">${formatBRL(kpis.faturamento_hoje)}</div>
                    <div class="kpi-subtext">${kpis.vendas_hoje} pedidos</div>
                    <div class="kpi-action">→ Ver todos os pedidos</div>
                </div>

                <div class="kpi-card" onclick="openModal('ads')">
                    <h3>Gasto em ADS</h3>
                    <div class="kpi-value">${formatBRL(kpis.ad_spend)}</div>
                    <div class="kpi-subtext">7 campanhas ativas</div>
                    <div class="kpi-action">→ Breakdown por campanha</div>
                </div>

                <div class="kpi-card">
                    <h3>Lucro Bruto</h3>
                    <div class="kpi-value">${formatBRL(kpis.lucro_bruto)}</div>
                    <div class="kpi-subtext">${formatPercent(kpis.margem_pct_real)} de margem</div>

                </div>

                <div class="kpi-card">
                    <h3>CMV Total</h3>
                    <div class="kpi-value">${formatBRL(kpis.cmv_total)}</div>

                    <div class="kpi-action">⚙️ Cadastrar custos</div>
                </div>

                <div class="kpi-card">
                    <h3>ACOS</h3>
                    <div class="kpi-value">${formatPercent(kpis.acos)}</div>
                    <div class="kpi-subtext">Ad Cost of Sale</div>
                    <div class="kpi-action">ℹ️ Ad spend ÷ Revenue</div>
                </div>

                <div class="kpi-card">
                    <h3>TACOS</h3>
                    <div class="kpi-value">${formatPercent(kpis.tacos)}</div>
                    <div class="kpi-subtext">Total ADS Cost</div>
                    <div class="kpi-action">ℹ️ Todas as fontes</div>
                </div>
            `;
            document.getElementById('kpi-grid').innerHTML = html;
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* RENDER PRODUCTS TABLE                                                               */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        function renderProducts() {
            const products = dashboardData.top5;
            let html = '';

            products.forEach((product, idx) => {
                const cost = costData[product.title] || product.custo;
                const lucro = product.faturamento - cost * product.vendas;
                const margem = (lucro / product.faturamento) * 100;

                html += `
                    <tr>
                        <td><div class="product-name">${product.title}</div></td>
                        <td>${product.vendas}</td>
                        <td>${formatBRL(product.faturamento)}</td>
                        <td>${formatBRL(cost * product.vendas)}</td>
                        <td class="${lucro >= 0 ? 'metric-positive' : 'metric-negative'}">${formatBRL(lucro)}</td>
                        <td class="${margem >= 0 ? 'metric-positive' : 'metric-negative'}">${formatPercent(margem)}</td>
                    </tr>
                `;
            });

            document.getElementById('products-tbody').innerHTML = html;
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* RENDER CAMPAIGNS                                                                    */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        function renderCampaigns() {
            // Mock data - ideally from ML API
            const campaigns = [
                {
                    nome: 'Moletom Zíper Hugo',
                    budget: 250,
                    gasto: 185,
                    cliques: 2145,
                    conversoes: 33,
                    roas: 12.1
                },
                {
                    nome: 'Kit 3 Calça Infantil',
                    budget: 100,
                    gasto: 87.50,
                    cliques: 650,
                    conversoes: 2,
                    roas: 4.1
                },
                {
                    nome: 'Brand Awareness',
                    budget: 100,
                    gasto: 97.50,
                    cliques: 8900,
                    conversoes: 16,
                    roas: 7.8
                }
            ];

            let html = '';
            campaigns.forEach((campaign) => {
                const ctr = ((campaign.cliques / 100000) * 100).toFixed(2);
                const cpc = (campaign.gasto / campaign.cliques).toFixed(2);
                const roi = ((campaign.roas - 1) * 100).toFixed(1);

                html += `
                    <div class="campaign-card">
                        <h3>${campaign.nome}</h3>
                        <div class="campaign-metric">
                            <span class="campaign-metric-label">Orçamento</span>
                            <span class="campaign-metric-value">${formatBRL(campaign.budget)}</span>
                        </div>
                        <div class="campaign-metric">
                            <span class="campaign-metric-label">Gasto</span>
                            <span class="campaign-metric-value">${formatBRL(campaign.gasto)}</span>
                        </div>
                        <div class="campaign-metric">
                            <span class="campaign-metric-label">Cliques</span>
                            <span class="campaign-metric-value">${campaign.cliques.toLocaleString('pt-BR')}</span>
                        </div>
                        <div class="campaign-metric">
                            <span class="campaign-metric-label">CPC</span>
                            <span class="campaign-metric-value">${formatBRL(parseFloat(cpc))}</span>
                        </div>
                        <div class="campaign-metric">
                            <span class="campaign-metric-label">Conversões</span>
                            <span class="campaign-metric-value">${campaign.conversoes}</span>
                        </div>
                        <div class="campaign-metric">
                            <span class="campaign-metric-label">ROAS</span>
                            <span class="campaign-metric-value">${campaign.roas}x</span>
                        </div>
                        <div class="campaign-metric">
                            <span class="campaign-metric-label">ROI</span>
                            <span class="campaign-metric-value">${roi}%</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('campaigns-grid').innerHTML = html;
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* COST MANAGEMENT                                                                     */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        function renderCostForm() {
            const products = dashboardData.top5;
            let productOptions = '<option value="">Selecione um produto...</option>';

            products.forEach((product) => {
                productOptions += `<option value="${product.title}">${product.title}</option>`;
            });

            document.getElementById('product-select').innerHTML = productOptions;

            // Populate cost history for first product
            if (products.length > 0) {
                updateCostHistory(products[0].title);
            }
        }

        document.addEventListener('change', (e) => {
            if (e.target.id === 'product-select') {
                updateCostHistory(e.target.value);
            }
        });

        function updateCostHistory(productName) {
            if (!productName) {
                document.getElementById('cost-history').innerHTML = '';
                return;
            }

            const cost = costData[productName];
            const product = dashboardData.top5.find(p => p.title === productName);

            let html = '<h4>Histórico de Custos</h4>';

            if (cost && cost.history) {
                cost.history.forEach((item) => {
                    html += `
                        <div class="cost-history-item">
                            <span>${item.date}</span>
                            <span>${formatBRL(item.value)}</span>
                        </div>
                    `;
                });
            } else if (product) {
                html += `
                    <div class="cost-history-item">
                        <span>Custo padrão (original)</span>
                        <span>${formatBRL(product.custo)}</span>
                    </div>
                `;
            }

            document.getElementById('cost-history').innerHTML = html;
        }

        function saveCost() {
            const productName = document.getElementById('product-select').value;
            const costValue = parseFloat(document.getElementById('cost-input').value);

            if (!productName) {
                alert('Selecione um produto');
                return;
            }

            if (isNaN(costValue) || costValue < 0) {
                alert('Insira um valor válido');
                return;
            }

            if (!costData[productName]) {
                costData[productName] = { history: [] };
            }

            const today = new Date().toLocaleDateString('pt-BR');
            costData[productName].history = costData[productName].history || [];
            costData[productName].history.unshift({
                date: today,
                value: costValue
            });

            // Keep only last 5 entries
            costData[productName].history = costData[productName].history.slice(0, 5);

            saveCosts();

            document.getElementById('cost-input').value = '';
            updateCostHistory(productName);
            renderProducts(); // Refresh table

            alert('✓ Custo atualizado com sucesso!');
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* MODALS                                                                              */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        function openModal(type) {
            if (type === 'orders') {
                renderOrdersModal();
                document.getElementById('modal-orders').classList.add('active');
            } else if (type === 'ads') {
                renderAdsModal();
                document.getElementById('modal-ads').classList.add('active');
            }
        }

        function closeModal(type) {
            if (type === 'orders') {
                document.getElementById('modal-orders').classList.remove('active');
            } else if (type === 'ads') {
                document.getElementById('modal-ads').classList.remove('active');
            }
        }

        function renderOrdersModal() {
            const products = dashboardData.top5;
            let html = '';

            products.forEach((product) => {
                const cost = costData[product.title] || product.custo;
                const lucro = product.faturamento - (cost * product.vendas);
                const margem = (lucro / product.faturamento) * 100;

                html += `
                    <div class="order-item">
                        <img src="https://via.placeholder.com/120?text=Produto" class="order-image" alt="Produto">
                        <div class="order-info">
                            <div class="order-title">${product.title}</div>
                            <div class="order-details">
                                <div>
                                    <div class="order-detail-label">Vendas</div>
                                    <div class="order-detail-value">${product.vendas}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Faturamento</div>
                                    <div class="order-detail-value">${formatBRL(product.faturamento)}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">CMV</div>
                                    <div class="order-detail-value">${formatBRL(cost * product.vendas)}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Lucro</div>
                                    <div class="order-detail-value ${lucro >= 0 ? 'positive' : 'negative'}">${formatBRL(lucro)}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Margem</div>
                                    <div class="order-detail-value ${margem >= 0 ? 'positive' : 'negative'}">${formatPercent(margem)}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Taxa ML</div>
                                    <div class="order-detail-value">${formatBRL(product.taxa_ml)}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('orders-list').innerHTML = html;
        }

        function renderAdsModal() {
            const campaigns = [
                { nome: 'Moletom Zíper Hugo', budget: 250, gasto: 185, cliques: 2145, impressoes: 145000, conversoes: 33, ticket: 67.87 },
                { nome: 'Kit 3 Calça Infantil', budget: 100, gasto: 87.50, cliques: 650, impressoes: 42000, conversoes: 2, ticket: 89.99 },
                { nome: 'Brand Awareness', budget: 100, gasto: 97.50, cliques: 8900, impressoes: 185000, conversoes: 16, ticket: 72.45 }
            ];

            let html = '';
            campaigns.forEach((campaign) => {
                const ctr = ((campaign.cliques / campaign.impressoes) * 100).toFixed(2);
                const cpc = (campaign.gasto / campaign.cliques).toFixed(2);
                const cpa = (campaign.gasto / campaign.conversoes).toFixed(2);
                const roas = (campaign.conversoes * campaign.ticket / campaign.gasto).toFixed(2);

                html += `
                    <div class="order-item">
                        <div class="order-info" style="width: 100%;">
                            <div class="order-title">${campaign.nome}</div>
                            <div class="order-details">
                                <div>
                                    <div class="order-detail-label">Orçamento</div>
                                    <div class="order-detail-value">${formatBRL(campaign.budget)}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Gasto</div>
                                    <div class="order-detail-value">${formatBRL(campaign.gasto)}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Impressões</div>
                                    <div class="order-detail-value">${campaign.impressoes.toLocaleString('pt-BR')}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Cliques</div>
                                    <div class="order-detail-value">${campaign.cliques.toLocaleString('pt-BR')}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">CTR</div>
                                    <div class="order-detail-value">${ctr}%</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">CPC</div>
                                    <div class="order-detail-value">${formatBRL(parseFloat(cpc))}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">Conversões</div>
                                    <div class="order-detail-value">${campaign.conversoes}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">CPA</div>
                                    <div class="order-detail-value">${formatBRL(parseFloat(cpa))}</div>
                                </div>
                                <div>
                                    <div class="order-detail-label">ROAS</div>
                                    <div class="order-detail-value positive">${roas}x</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('ads-list').innerHTML = html;
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* CHART RENDERING (Simple Chart with CSS)                                             */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        function renderChart() {
            const chart = dashboardData.chart;
            const maxFat = Math.max(...chart.faturamento);
            const maxVendas = Math.max(...chart.vendas);

            let html = '<div style="display: flex; gap: 16px; overflow-x: auto; padding: 16px 0;">';

            for (let i = 0; i < chart.labels.length; i++) {
                const fatPerc = (chart.faturamento[i] / maxFat) * 100;
                const vendasPerc = (chart.vendas[i] / maxVendas) * 100;

                html += `
                    <div style="flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                        <div style="display: flex; gap: 4px; height: 200px; align-items: flex-end;">
                            <div style="width: 12px; height: ${fatPerc}%; background: #D1FF00; border-radius: 4px; opacity: 0.9;" title="Fat: ${formatBRL(chart.faturamento[i])}"></div>
                            <div style="width: 12px; height: ${vendasPerc}%; background: #00E5B4; border-radius: 4px; opacity: 0.9;" title="Vendas: ${chart.vendas[i]}"></div>
                        </div>
                        <div style="font-size: 12px; color: var(--text-secondary); white-space: nowrap;">${chart.labels[i]}</div>
                    </div>
                `;
            }

            html += '</div>';
            document.getElementById('chart-container').innerHTML = html;
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* MAIN RENDER                                                                         */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        function renderDashboard() {
            renderKPIs();
            renderProducts();
            renderCampaigns();
            renderCostForm();
            renderChart();
        }

        /* ═══════════════════════════════════════════════════════════════════════════════════ */
        /* INITIALIZATION                                                                      */
        /* ═══════════════════════════════════════════════════════════════════════════════════ */

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        // Close modals on background click
        document.getElementById('modal-orders').addEventListener('click', (e) => {
            if (e.target.id === 'modal-orders') closeModal('orders');
        });

        document.getElementById('modal-ads').addEventListener('click', (e) => {
            if (e.target.id === 'modal-ads') closeModal('ads');
        });

        // Load on startup
        document.addEventListener('DOMContentLoaded', () => {
            loadCosts();
            initTheme();
            loadDashboard();
            setInterval(updateTimeDisplay, 60000); // Update time every minute
        });
    </script>
